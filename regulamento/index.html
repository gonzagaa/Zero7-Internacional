<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero7 Trading</title>
  <meta http-equiv="refresh" content="0;url=./pt/">
  <script>
    (function () {
      var SUPPORTED = ['pt', 'en', 'es'];
      var DEFAULT_LANG = 'pt';
      var STORAGE_KEY = 'zero7-lang';

      function normalize(raw) {
        if (!raw) return null;
        var base = String(raw).toLowerCase().split('-')[0];
        return SUPPORTED.indexOf(base) !== -1 ? base : null;
      }

      var lang = null;

      try {
        var params = new URLSearchParams(window.location.search);
        lang = normalize(params.get('lang'));
      } catch (e) {}

      if (!lang) {
        try {
          lang = normalize(localStorage.getItem(STORAGE_KEY));
        } catch (e) {}
      }

      if (!lang) {
        try {
          var navLangs = navigator.languages || [navigator.language];
          for (var i = 0; i < navLangs.length; i++) {
            var n = normalize(navLangs[i]);
            if (n) { lang = n; break; }
          }
        } catch (e) {}
      }

      if (!lang) lang = DEFAULT_LANG;

      window.location.replace('./' + lang + '/');
    })();
  </script>
</head>
<body>
  <p>Redirecting... <a href="./pt/">Click here if not redirected</a></p>
</body>
</html>
